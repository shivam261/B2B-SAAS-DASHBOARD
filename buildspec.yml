version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
  pre_build:
    commands:
      - npm install -g pnpm
      - pnpm install
  build:
    commands:
      - pnpm run build
  post_build:
    commands:
      - echo "Build complete"

artifacts:
  files:
    - '**/*'
  name: BuildArtifact
  discard-paths: yes